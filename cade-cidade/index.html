<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadê minha Cidade?</title>
  <meta name="description" content="O Brasil tem 5.570 municípios. E alguém colocou todos num dropdown.">
  <meta property="og:title" content="Cadê minha Cidade?">
  <meta property="og:description" content="O Brasil tem 5.570 municípios. E alguém colocou todos num dropdown.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://felipebossolani.github.io/cade-cidade/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@felipebossolani">
  <meta name="twitter:title" content="Cadê minha Cidade?">
  <meta name="twitter:description" content="O Brasil tem 5.570 municípios. E alguém colocou todos num dropdown.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏙️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #0D0D0D;
      color: #E0E0E0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    header, main, footer {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 80px 0;
    }

    h1 {
      font-weight: 800;
      font-size: clamp(2.4rem, 6vw, 4rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #FFFFFF;
      margin-bottom: 32px;
    }

    h2 {
      font-weight: 800;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      line-height: 1.2;
      color: #FFFFFF;
      margin-bottom: 24px;
    }

    p {
      margin-bottom: 20px;
    }

    strong {
      color: #FFFFFF;
      font-weight: 700;
    }

    code {
      background: #1A1A1A;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9em;
      color: #00FF41;
    }

    pre {
      background: #1A1A1A;
      padding: 20px 24px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 24px 0;
      border: 1px solid #2A2A2A;
    }

    pre code {
      background: none;
      padding: 0;
      font-size: 0.85em;
      line-height: 1.6;
    }

    .highlight-green {
      color: #00FF41;
    }

    .highlight-red {
      color: #C0392B;
    }

    .highlight-yellow {
      color: #F39C12;
    }

    #hero {
      padding-top: 120px;
      padding-bottom: 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    select {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      background: #1A1A1A;
      color: #E0E0E0;
      border: 1px solid #333;
      padding: 10px 14px;
      border-radius: 6px;
      width: 100%;
      max-width: 400px;
      cursor: pointer;
      appearance: auto;
    }

    select:focus {
      outline: none;
      border-color: #F39C12;
    }

    input[type="text"] {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      background: #1A1A1A;
      color: #E0E0E0;
      border: 1px solid #333;
      padding: 10px 14px;
      border-radius: 6px;
      width: 100%;
      max-width: 400px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #00FF41;
    }

    .demo-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 24px;
      margin: 24px 0;
    }

    .demo-feedback {
      margin-top: 16px;
      font-size: 14px;
      min-height: 24px;
    }

    .timer {
      color: #F39C12;
      font-weight: 700;
    }

    .counter {
      color: #F39C12;
      font-size: 13px;
    }

    footer {
      padding: 60px 0;
      text-align: center;
    }

    footer a {
      color: #E0E0E0;
      text-decoration: none;
      border-bottom: 1px solid #333;
      transition: border-color 0.2s;
    }

    footer a:hover {
      border-color: #00FF41;
      color: #00FF41;
    }

    .share-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .share-links a, .share-links button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #E0E0E0;
      background: none;
      border: 1px solid #333;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .share-links a:hover, .share-links button:hover {
      border-color: #00FF41;
      color: #00FF41;
    }

    @media (max-width: 600px) {
      section {
        padding: 60px 0;
      }

      #hero {
        padding-top: 80px;
        min-height: auto;
      }

      .demo-box {
        padding: 16px;
      }

      select, input[type="text"] {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <header id="hero">
  </header>

  <main>
    <section id="opcoes">
    </section>

    <section id="demo-dropdown">
    </section>

    <section id="demo-cascata">
    </section>

    <section id="solucao">
    </section>

    <section id="cep">
    </section>

    <section id="fechamento">
    </section>
  </main>

  <footer>
  </footer>

</body>
</html>
